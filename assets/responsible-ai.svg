<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 686" width="1200" height="686" font-family="Inter, 'DejaVu Sans', Arial, sans-serif" role="img" aria-label="AI risks and Cambium controls">
<defs>
<linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#07231A"/><stop offset="100%" stop-color="#0A2A1F"/></linearGradient>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16C079"/></marker>
</defs>
<rect width="1200" height="686" fill="url(#bgg)"/>
<text x="600.0" y="46" text-anchor="middle" fill="#F4F7F2" font-size="27" font-weight="800">AI in research: the risks, and what Cambium does about each</text>
<text x="264.0" y="80" text-anchor="middle" fill="#FF6B5E" font-size="14" font-weight="700" letter-spacing="3">THE CONCERN</text>
<text x="936.0" y="80" text-anchor="middle" fill="#16C079" font-size="14" font-weight="700" letter-spacing="3">THE ENFORCED CONTROL</text>
<rect x="44" y="96" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="96" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="121" fill="#F4F7F2" font-size="16" font-weight="700">Overclaiming</text>
<text x="66" y="141" fill="#8AA197" font-size="12.5">stating more than the evidence supports</text>
<rect x="716" y="96" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="96" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="121" fill="#B7F36A" font-size="16" font-weight="700">4-tier evidence contract</text>
<text x="738" y="141" fill="#F4F7F2" font-size="12.5">CI fails on un-evidenced claims (validate.py)</text>
<line x1="490" y1="125.0" x2="710" y2="125.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="168" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="168" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="193" fill="#F4F7F2" font-size="16" font-weight="700">Fabricated or unresolvable citations</text>
<text x="66" y="213" fill="#8AA197" font-size="12.5">references that don't exist</text>
<rect x="716" y="168" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="168" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="193" fill="#B7F36A" font-size="16" font-weight="700">Citation-resolution gate</text>
<text x="738" y="213" fill="#F4F7F2" font-size="12.5">unsupported = release blocker</text>
<line x1="490" y1="197.0" x2="710" y2="197.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="240" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="240" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="265" fill="#F4F7F2" font-size="16" font-weight="700">Speed collapses human judgment</text>
<text x="66" y="285" fill="#8AA197" font-size="12.5">decisions outrun deliberation</text>
<rect x="716" y="240" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="240" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="265" fill="#B7F36A" font-size="16" font-weight="700">Pace check</text>
<text x="738" y="285" fill="#F4F7F2" font-size="12.5">30-min deliberation interval between gates</text>
<line x1="490" y1="269.0" x2="710" y2="269.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="312" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="312" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="337" fill="#F4F7F2" font-size="16" font-weight="700">AI erases the human's learning</text>
<text x="66" y="357" fill="#8AA197" font-size="12.5">you ship work you didn't grow into</text>
<rect x="716" y="312" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="312" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="337" fill="#B7F36A" font-size="16" font-weight="700">Learning Gate</text>
<text x="738" y="357" fill="#F4F7F2" font-size="12.5">a real Director contribution is required to pass</text>
<line x1="490" y1="341.0" x2="710" y2="341.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="384" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="384" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="409" fill="#F4F7F2" font-size="16" font-weight="700">Bias goes unexamined</text>
<text x="66" y="429" fill="#8AA197" font-size="12.5">unfairness ships unchecked</text>
<rect x="716" y="384" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="384" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="409" fill="#B7F36A" font-size="16" font-weight="700">Bias checklist (NIST AI RMF)</text>
<text x="738" y="429" fill="#F4F7F2" font-size="12.5">enforced before G4 / G5</text>
<line x1="490" y1="413.0" x2="710" y2="413.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="456" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="456" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="481" fill="#F4F7F2" font-size="16" font-weight="700">Sensitive data leaks</text>
<text x="66" y="501" fill="#8AA197" font-size="12.5">PII / regulated data escapes</text>
<rect x="716" y="456" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="456" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="481" fill="#B7F36A" font-size="16" font-weight="700">PII / regulated-data scanner</text>
<text x="738" y="501" fill="#F4F7F2" font-size="12.5">runs in your own account</text>
<line x1="490" y1="485.0" x2="710" y2="485.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="528" width="440" height="58" rx="14" fill="#0E3326" stroke="#FF6B5E" stroke-width="1.8"/>
<rect x="44" y="528" width="6" height="58" rx="3" fill="#FF6B5E"/>
<text x="66" y="553" fill="#F4F7F2" font-size="16" font-weight="700">Authorship &amp; accountability blur</text>
<text x="66" y="573" fill="#8AA197" font-size="12.5">no one is responsible</text>
<rect x="716" y="528" width="440" height="58" rx="14" fill="#15402F" stroke="#16C079" stroke-width="1.8"/>
<rect x="1150" y="528" width="6" height="58" rx="3" fill="#16C079"/>
<text x="738" y="553" fill="#B7F36A" font-size="16" font-weight="700">Named human signature at every gate</text>
<text x="738" y="573" fill="#F4F7F2" font-size="12.5">AI is never an author</text>
<line x1="490" y1="557.0" x2="710" y2="557.0" stroke="#16C079" stroke-width="2" opacity="0.8" marker-end="url(#arrow)"/>
<rect x="44" y="612" width="1112" height="44" rx="14" fill="#B7F36A"/>
<text x="600.0" y="641" text-anchor="middle" fill="#052015" font-size="17" font-weight="800">The human stays responsible for validity, ethics, and decisions.</text>
</svg>