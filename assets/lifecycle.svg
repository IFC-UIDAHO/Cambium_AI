<rect x="1" y="1" width="1078" height="410" rx="17" fill="none" stroke="#1F4D3B"/>
<text x="40" y="38" font-size="24" font-weight="800" fill="#F4F7F2">The Cambium research lifecycle</text>
<text x="40" y="60" font-size="13" fill="#8AA197">Eight human gates. A named person signs each one before work proceeds.</text>
