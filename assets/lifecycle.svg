<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 412" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The Cambium research lifecycle: eight phases (Intake, Pre-Award, Design, Submit, Build/Run-Lab, Verify, Report, Publish), each showing the councils that act in it and the human gate that closes it. A named person signs every gate.">
<defs>
<linearGradient id="lbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0b2c20"/><stop offset="100%" stop-color="#07231a"/></linearGradient>
<linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#16C079"/><stop offset="100%" stop-color="#B7F36A"/></linearGradient>
</defs>
