<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Cambium mark">
  <defs>
    <radialGradient id="wood" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#13402f"/><stop offset="100%" stop-color="#0a241b"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" rx="44" fill="url(#wood)"/>
  <!-- growth rings (silver) -->
  <g fill="none" stroke="#cfd6e0" stroke-opacity="0.55">
    <circle cx="120" cy="120" r="30" stroke-width="2"/>
    <circle cx="120" cy="120" r="46" stroke-width="2"/>
    <circle cx="120" cy="120" r="62" stroke-width="2"/>
    <circle cx="120" cy="120" r="78" stroke-width="2"/>
  </g>
  <!-- the CAMBIUM ring (gold, the living growth layer) -->
  <circle cx="120" cy="120" r="92" fill="none" stroke="#e7b84b" stroke-width="8"/>
  <!-- bark edge -->
  <circle cx="120" cy="120" r="100" fill="none" stroke="#2b1c10" stroke-width="6"/>
  <!-- pith + a sprout -->
  <circle cx="120" cy="120" r="6" fill="#e7b84b"/>
  <path d="M120 120 C120 96 120 74 120 56 M120 76 C108 70 100 64 96 54 M120 76 C132 70 140 64 144 54"
        fill="none" stroke="#7fe0a8" stroke-width="5" stroke-linecap="round"/>
</svg>
